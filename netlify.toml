[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# --- HOMEPAGE: make "/" the one true URL ---
[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301
  force = true

# Catch a couple variants just in case
[[redirects]]
  from = "/index.htm"
  to   = "/"
  status = 301
  force = true

# --- INNER PAGES: keep ".html" as canonical (your current pattern) ---
